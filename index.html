<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractal Form Lab</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <div id="app">
      <main id="labGrid">
        <section class="viewPanel">
          <header>EC edge construction</header>
          <canvas id="edgeCanvas"></canvas>
        </section>
        <section class="viewPanel">
          <header>Division all A/B/C</header>
          <canvas id="divisionAbcCanvas"></canvas>
        </section>
        <section class="viewPanel">
          <header>Division single A</header>
          <canvas id="divisionACanvas"></canvas>
        </section>
        <section class="viewPanel">
          <header>Division single B</header>
          <canvas id="divisionBCanvas"></canvas>
        </section>
        <section class="viewPanel">
          <header>Division single C</header>
          <canvas id="divisionCCanvas"></canvas>
        </section>
        <section class="viewPanel">
          <header>Division pair A+B</header>
          <canvas id="divisionAbCanvas"></canvas>
        </section>
        <section class="viewPanel">
          <header>Division pair B+C</header>
          <canvas id="divisionBcCanvas"></canvas>
        </section>
        <section class="viewPanel">
          <header>Division pair C+A</header>
          <canvas id="divisionCaCanvas"></canvas>
        </section>
      </main>
      <aside id="controlPanel">
        <div class="brand">
          <span>Triangle Lab</span>
          <small>old project EC/subdivision rules</small>
        </div>
        <div id="stats">
          <div><span>Selected preview triangles</span><strong id="triangleCount">0</strong></div>
        </div>
        <form id="controls"></form>
        <p id="warning"></p>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
