<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractal Form Lab</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <div id="app">
      <main id="workspace">
        <nav id="tabs">
          <button class="tabButton active" type="button" data-tab="mainTab">Form</button>
          <button class="tabButton" type="button" data-tab="stepsTab">Recursion steps</button>
        </nav>
        <section id="mainTab" class="tabPane active">
          <div id="mainGrid">
            <section class="viewPanel">
              <header>Target_4 reference</header>
              <canvas id="targetCanvas"></canvas>
            </section>
            <section class="viewPanel">
              <header>EC edge construction</header>
              <canvas id="edgeCanvas"></canvas>
            </section>
            <section class="viewPanel generatedPanel">
              <header>Generated form</header>
              <canvas id="generatedCanvas"></canvas>
            </section>
          </div>
        </section>
        <section id="stepsTab" class="tabPane">
          <div id="stepsGrid">
            <section class="viewPanel">
              <header>Seed</header>
              <canvas id="step0Canvas"></canvas>
            </section>
            <section class="viewPanel">
              <header>Recursion 1</header>
              <canvas id="step1Canvas"></canvas>
            </section>
            <section class="viewPanel">
              <header>Recursion 2</header>
              <canvas id="step2Canvas"></canvas>
            </section>
            <section class="viewPanel">
              <header>Recursion 3</header>
              <canvas id="step3Canvas"></canvas>
            </section>
            <section class="viewPanel">
              <header>Recursion 4</header>
              <canvas id="step4Canvas"></canvas>
            </section>
            <section class="viewPanel">
              <header>Recursion 5</header>
              <canvas id="step5Canvas"></canvas>
            </section>
            <section class="viewPanel">
              <header>Recursion 6</header>
              <canvas id="step6Canvas"></canvas>
            </section>
          </div>
        </section>
      </main>
      <aside id="controlPanel">
        <div class="brand">
          <span>Triangle Lab</span>
          <small>old project EC/subdivision rules</small>
        </div>
        <div id="stats">
          <div><span>Generated triangles</span><strong id="triangleCount">0</strong></div>
        </div>
        <form id="controls"></form>
        <p id="warning"></p>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
